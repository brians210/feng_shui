<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>八字排盤 · 命理命盤</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="bazi-data.js"></script>
  <script type="text/babel" src="BirthForm.jsx"></script>
  <script type="text/babel" src="BaziTable.jsx"></script>
  <script type="text/babel" src="ResultPanels.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [input, setInput] = useState(null);

      const handleSubmit = async (data) => {
        setLoading(true);
        setInput(data);
        // 微小延遲讓「排盤中…」有感覺
        setTimeout(async () => {
          const r = await window.computeBazi(data);
          setResult(r);
          setLoading(false);
          setTimeout(() => {
            const el = document.getElementById('result-anchor');
            if (el) window.scrollTo({ top: el.offsetTop - 20, behavior: 'smooth' });
          }, 50);
        }, 400);
      };

      const fmtInput = (d) => {
        if (!d) return '';
        const pad = (n) => String(n).padStart(2, '0');
        const calName = d.calendar === 'solar' ? '陽曆' : '農曆';
        const genName = d.gender === 'male' ? '乾造' : '坤造';
        return `${calName} ${d.year}年${pad(d.month)}月${pad(d.day)}日 ${pad(d.hour)}:${pad(d.minute)} · ${genName}`;
      };

      return (
        <div className="app">
          <header className="masthead">
            <h1 className="title-zh">
              八 字 命 盤
              <span className="seal">排盤</span>
            </h1>
            <div className="subtitle">四柱八字 · 十神神煞 · 五行喜忌 · 大運流年</div>
          </header>

          <window.BirthForm onSubmit={handleSubmit} loading={loading} />

          {!result && !loading && (
            <div className="empty-state">
              <div className="big">盤</div>
              <div>請輸入出生資訊，點擊「起盤」以生成命盤</div>
            </div>
          )}

          {result && (
            <>
              <div id="result-anchor" />

              <div className="section-header">
                <span className="num">ONE</span>
                <span className="title">命主資訊</span>
                <span className="rule" />
              </div>
              <div className="person-card">
                {input?.name && (
                  <div className="field-item"><div className="lbl">姓名</div><div className="val">{input.name}</div></div>
                )}
                <div className="field-item"><div className="lbl">性別</div><div className="val">{input.gender === 'male' ? '乾造（男）' : '坤造（女）'}</div></div>
                <div className="field-item"><div className="lbl">出生</div><div className="val">{fmtInput(input)}</div></div>
                <div className="field-item"><div className="lbl">日主</div><div className="val">
                  <span className={`w-${{'木':'mu','火':'huo','土':'tu','金':'jin','水':'shui'}[result.rizhu.wuxing]}`} style={{fontSize: 20, fontWeight: 900, marginRight: 8}}>{result.rizhu.gan}</span>
                  {result.rizhu.yinyang}{result.rizhu.wuxing}
                </div></div>
              </div>

              <div className="section-header">
                <span className="num">TWO</span>
                <span className="title">四柱八字</span>
                <span className="rule" />
              </div>
              <div style={{fontSize: 12, color: 'var(--ink-muted)', fontFamily: 'var(--serif)', letterSpacing: '0.1em', marginBottom: 10}}>
                點擊天干或地支查看詳細解釋
              </div>
              <window.BaziTable data={result} />

              <div className="section-header">
                <span className="num">THREE</span>
                <span className="title">五行分佈</span>
                <span className="rule" />
              </div>
              <window.WuxingChart counts={result.wuxingCount} rizhuWuxing={result.rizhu.wuxing} />

              <div className="section-header">
                <span className="num">FOUR</span>
                <span className="title">日主強弱</span>
                <span className="rule" />
              </div>
              <window.StrengthPanel strength={result.strength} rizhu={result.rizhu} />

              <div className="section-header">
                <span className="num">FIVE</span>
                <span className="title">命格概述</span>
                <span className="rule" />
              </div>
              <window.OverviewCard text={result.overview} />

              <div className="section-header">
                <span className="num">SIX</span>
                <span className="title">大運流程</span>
                <span className="rule" />
              </div>
              <window.DayunTable dayun={result.dayun} />
            </>
          )}

          <div className="site-foot">
            © 八字排盤 · 僅供命理研究參考
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
